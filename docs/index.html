<tbody id="rows"></tbody></table></div></div>
<script>
const D=[{"id": "c5ab1e8048f84d07", "title": "Latam Data Engineer", "company": "Adzuna LATAM", "location": "Saint Louis County, Maryland Heights", "remote": true, "score": 16, "tier": "T1", "industry": "", "language": "en", "visa": false, "keywords": ["data engineer", "region_t1", "usd", "sr:iv"], "url": "https://www.adzuna.com/details/5798382487?utm_medium=api&utm_source=cc1da179", "posted_at": "2026-07-12T20:58:07+00:00", "first_seen_at": "2026-07-13T09:39:52.999593+00:00", "recruiter": "", "ats": "adzuna", "status": "new", "strategy": "job_board_aggregator", "company_tier": "A", "phase": 1}, {"id": "33989ba5d861b6d7", "title": "Contract Senior Data Engineer (São Paulo, Brazil)", "company": "Adzuna LATAM", "location": "Brasil", "remote": true, "score": 16, "tier": "T1", "industry": "", "language": "pt", "visa": false, "keywords": ["data engineer", "region_t1", "usd", "sr:senior"], "url": "https://www.adzuna.com.br/details/5798315290?utm_medium=api&utm_source=cc1da179", "posted_at": "2026-07-12T20:07:05+00:00", "first_seen_at": "2026-07-13T09:39:52.997365+00:00", "recruiter": "", "ats": "adzuna", "status": "new", "strategy": "job_board_aggregator", "company_tier": "A", "phase": 1}, {"id": "ca31a9a69aad49e5", "title": "Data Engineer (Alteryx | AWS) | PL (Remote)", "company": "Adzuna LATAM", "location": "Brasil", "remote": true, "score": 19, "tier": "T1", "industry": "", "language": "pt", "visa": false, "keywords": ["data engineer", "t1:aws glue", "region_t1", "usd", "sr:iv"], "url": "https://www.adzuna.com.br/details/5798308164?utm_medium=api&utm_source=cc1da179", "posted_at": "2026-07-12T19:53:03+00:00", "first_seen_at": "2026-07-13T00:01:05.732850+00:00", "recruiter": "", "ats": "adzuna", "status": "new", "strategy": "job_board_aggregator", "company_tier": "A", "phase": 1}, {"id": "a893c28262139fbe", "title": "Remote Data Engineer", "company": "Adzuna LATAM", "location": "Estado de São Paulo, Guarulhos", "remote": true, "score": 16, "tier": "T1", "industry": "", "language": "pt", "visa": false, "keywords": ["data engineer", "region_t1", "usd", "sr:iv"], "url": "https://www.adzuna.com.br/details/5794814445?utm_medium=api&utm_source=cc1da179", "posted_at": "2026-07-09T20:18:45+00:00", "first_seen_at": "2026-07-12T21:13:51.773767+00:00", "recruiter": "", "ats": "adzuna", "status": "new", "strategy": "job_board_aggregator", "company_tier": "A", "phase": 1}];const N=new Date();
function h(iso){if(!iso)return 999999;return (N-new Date(iso))/3600000;}
function r(iso){const x=h(iso);if(x<1)return{l:'🔥 '+Math.round(x*60)+'min',c:'radar-super'};
if(x<6)return{l:'🔥 '+Math.round(x)+'h',c:'radar-fresh'};if(x<24)return{l:'⚡ '+Math.round(x)+'h',c:'radar-recent'};
if(x<72)return{l:Math.round(x/24)+'d',c:'radar-normal'};return{l:'⚠️ '+Math.round(x/24)+'d',c:'radar-old'};}
function sb(s){let c="score-low";if(s>=18)c="score-high";else if(s>=10)c="score-mid";return `<span class="${c} text-xs font-bold px-2 py-1 rounded">${s}</span>`;}
function tb(t){return `<span class="tier-${t.toLowerCase()} text-xs font-bold px-2 py-1 rounded">${t}</span>`;}
function render(){const q=document.getElementById("q").value.toLowerCase();const tf=document.getElementById("tf").value;const ff=document.getElementById("ff").value;

if(!q)return true;const b=(j.title+" "+j.company+" "+j.location+" "+(j.keywords||[]).join(" ")).toLowerCase();return b.includes(q);});

document.getElementById("rows").innerHTML=f.map(j=>{const rd=r(j.first_seen_at);
return `<tr class="border-t"><td class="px-3 py-2"><span class="${rd.c} text-xs px-2 py-1 rounded">${rd.l}</span></td>
<td class="px-3 py-2">${tb(j.tier)}</td><td class="px-3 py-2">${sb(j.score)}</td>
<td class="px-3 py-2 font-medium">${j.title}</td><td class="px-3 py-2">${j.company}</td>
<td class="px-3 py-2">${j.remote?"🌎 ":""}${j.location}</td><td class="px-3 py-2 text-center">${j.visa?"🛂":""}</td>
<td class="px-3 py-2"><a href="${j.url}" target="_blank" class="text-blue-600 hover:underline">apply ↗</a></td></tr>`;}).join("");}
["q","tf","ff"].forEach(id=>{document.getElementById(id).addEventListener("input",render);document.getElementById(id).addEventListener("change",render);});render();
</script></body></html>
